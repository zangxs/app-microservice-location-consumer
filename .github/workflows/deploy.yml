name: Deploy Location Consumer

on:
  release:
    types: [published]
  workflow_dispatch:

env:
  EC2_HOST: 3.19.62.218
  EC2_USER: ubuntu
  DEPLOY_PATH: /opt/landscape-app

jobs:
  build-and-test:
    name: Build & Test Location Consumer
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Install common-dto-library
        run: |
          git clone https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/zangxs/common-dto-library.git
          cd common-dto-library
          mvn clean install -DskipTests

      - name: Build & Test Location Consumer
        run: mvn clean test

  deploy:
    name: Deploy Location Consumer to EC2
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Upload location-consumer to EC2
        run: |
          rsync -avz --delete \
            --exclude 'node_modules' \
            --exclude 'target' \
            --exclude '.git' \
            --exclude '.github' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            ./ ${{ env.EC2_USER }}@${{ env.EC2_HOST }}:${{ env.DEPLOY_PATH }}/app-microservice-location-consumer/

      - name: Verify infrastructure on EC2
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ env.EC2_USER }}@${{ env.EC2_HOST }} "
            if [ ! -f ${{ env.DEPLOY_PATH }}/infrastructure/docker-compose.yml ]; then
              echo 'ERROR: docker-compose.yml not found' && exit 1
            fi &&
            if [ ! -f ${{ env.DEPLOY_PATH }}/infrastructure/.env ]; then
              echo 'ERROR: .env not found' && exit 1
            fi &&
            ls -la ${{ env.DEPLOY_PATH }}/infrastructure/
          "

      - name: Deploy location-consumer
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ env.EC2_USER }}@${{ env.EC2_HOST }} "docker compose -f ${{ env.DEPLOY_PATH }}/infrastructure/docker-compose.yml --env-file ${{ env.DEPLOY_PATH }}/infrastructure/.env up -d --build location-consumer && docker image prune -f"

      - name: Verify deployment
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ env.EC2_USER }}@${{ env.EC2_HOST }} "docker compose -f ${{ env.DEPLOY_PATH }}/infrastructure/docker-compose.yml --env-file ${{ env.DEPLOY_PATH }}/infrastructure/.env ps location-consumer"
